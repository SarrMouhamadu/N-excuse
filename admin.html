<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO EXCUSE — Admin Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { padding: 40px 20px; max-width: 1200px; margin: 0 auto; background: #0d0d0d; color: #f0f0f0; }
  .admin-card { background: #141414; border: 1px solid #2e2e2e; padding: 30px; border-radius: 8px; margin-bottom: 20px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .stat-box { background: #1a1a1a; padding: 25px; border-radius: 8px; border-left: 4px solid var(--red); text-align: center; }
  .stat-val { font-size: 32px; font-weight: 700; font-family: 'Oswald', sans-serif; color: var(--red); }
  .stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #777; margin-top: 5px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  th { text-align: left; padding: 12px; border-bottom: 2px solid #2e2e2e; font-family: 'Oswald', sans-serif; letter-spacing: 1px; text-transform: uppercase; color: #777; }
  td { padding: 15px 12px; border-bottom: 1px solid #222; }
  tr:hover { background: #1a1a1a; }
  
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .badge-pay { background: #2e2e2e; color: #f0f0f0; }
  
  .login-wrap { max-width: 400px; margin: 100px auto; text-align: center; }
  .login-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #2e2e2e; color: #fff; outline: none; }
  .login-btn { width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
  
  #adminDashboard { display: none; }
  .logout-btn { background: none; border: 1px solid #444; color: #777; padding: 8px 16px; font-size: 11px; cursor: pointer; float: right; }
</style>
</head>
<body>

<div id="loginSection" class="login-wrap">
  <h2 style="font-family: 'Oswald', sans-serif; letter-spacing: 4px; margin-bottom: 30px;">NO EXCUSE <span style="color:var(--red)">ADMIN</span></h2>
  <input type="text" id="admUser" class="login-input" placeholder="Utilisateur">
  <input type="password" id="admPass" class="login-input" placeholder="Mot de passe">
  <button class="login-btn" onclick="login()">CONNEXION</button>
  <p id="loginErr" style="color:var(--red); font-size:12px; margin-top:15px;"></p>
</div>

<div id="adminDashboard">
  <button class="logout-btn" onclick="logout()">DÉCONNEXION</button>
  <h2 style="font-family: 'Oswald', sans-serif; letter-spacing: 4px; margin-bottom: 40px;">TABLEAU DE BORD</h2>

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-val" id="statVisits">0</div>
      <div class="stat-label">Visites Totales</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statOrders">0</div>
      <div class="stat-label">Commandes</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statRevenue">0 CFA</div>
      <div class="stat-label">Chiffre d'Affaire</div>
    </div>
  </div>

  <div class="admin-card">
    <h3 style="font-family: 'Oswald', sans-serif; letter-spacing: 2px; margin-bottom: 20px;">BACKLOG DES COMMANDES</h3>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Région</th>
            <th>Produits</th>
            <th>Paiement</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="orderTable">
          <!-- Populated by admin.js -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
