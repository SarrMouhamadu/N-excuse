services:
  web:
    build: .
    container_name: no-excuse
    environment:
      - VIRTUAL_HOST=no-excuse.shop,www.no-excuse.shop
      - LETSENCRYPT_HOST=no-excuse.shop,www.no-excuse.shop
      - VIRTUAL_PORT=80
    restart: unless-stopped
    networks:
      - proxy-tier

networks:
  proxy-tier:
    external: true
