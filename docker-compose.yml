services:
  web:
    build: .
    container_name: no-excuse
    environment:
      - VIRTUAL_HOST=no-excuse.shop,www.no-excuse.shop
      - LETSENCRYPT_HOST=no-excuse.shop,www.no-excuse.shop
    networks:
      - proxy-tier
    depends_on:
      - api
    restart: always

  api:
    build: ./server
    container_name: no-excuse-api
    volumes:
      - ./server/data:/app/data
    networks:
      - proxy-tier
    restart: always

networks:
  proxy-tier:
    external: true
