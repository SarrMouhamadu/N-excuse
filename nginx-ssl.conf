server {
    listen 80;
    server_name no-excuse.shop www.no-excuse.shop;
    
    # Rediriger tout le trafic HTTP vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name no-excuse.shop www.no-excuse.shop;

    # Chemins vers les certificats générés par Certbot
    ssl_certificate /etc/letsencrypt/live/no-excuse.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/no-excuse.shop/privkey.pem;

    # Sécurité SSL basique (bonnes pratiques)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Configuration optimisée pour la production (identique à nginx.conf)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
            expires max;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        }
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
